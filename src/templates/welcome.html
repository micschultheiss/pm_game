<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hallucination Inc.</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

{# Boot-sequence title splash (locked "Glitch" direction). Plays once and
   settles on the logo. Dismissing it (ENTER / click / tap) starts the game. #}
<div id="splash" hidden></div>

{# Hidden form: the splash dismiss handler submits this to POST /start, which
   redirects to / and renders the game. #}
<form id="start-form" method="post" action="{{ url_for('start_game') }}" hidden></form>

<noscript>
  <div style="padding:40px;text-align:center;color:#f3f3fb;background:#07070c;font-family:monospace">
    <h1>HALLUCINATION INC.</h1>
    <form method="post" action="{{ url_for('start_game') }}">
      <button type="submit" class="g-btn solid">Start the run →</button>
    </form>
  </div>
</noscript>

<div class="g-scan"></div>

<script src="{{ url_for('static', filename='hallu-engine.js') }}"></script>
<script>
(function () {
  var root = document.getElementById('splash');
  var startForm = document.getElementById('start-form');
  if (!root || !window.HALLU || !startForm) return;  // no JS engine → noscript fallback shows

  var COPY = '© 2026 HALLUCINATION INC. — a wholly imagined subsidiary of ' +
    'nothing in particular. All hallucinations reserved. No tokens were harmed; ' +
    'several were overpriced.';

  // Boot log numbers track the live game ($100K cash / $100K debt @ 3%/day).
  var SPLASH_CFG = {
    effect: 'glitch', fill: '█', empty: ' ',
    loop: false,  // play the boot sequence once, then settle on the logo

    // 13-letter HALLUCINATION is ~77 block-columns wide; keep it under ~1.9vw
    // so the line fits the viewport (a monospace char advance is ~0.6em).
    wordSize: 'clamp(7px, 1.9vw, 26px)',
    bg: '#07070c', fg: '#f3f3fb', dim: '#262633', accent: '#21e6c1',
    warn: '#ff2d55', glow: '#6b6bff', r: '#ff2d55', b: '#21e6c1',
    scan: false, vignette: true,
    tagline: 'Move fast and fabricate things',
    prompt: 'PRESS [ENTER] · TAP TO CONTINUE',
    copy: COPY,
    boot: [
      ['HALLUCINATION INC. BIOS v0.30.0-hallucinated', 'OK', 'ok'],
      ['allocating $100,000 to volatile wallet', 'OK', 'ok'],
      ['servicing $100,000 debt @ 3.00%/day', 'OK', 'ok'],
      ['reticulating embeddings', 'OK', 'ok'],
      ['calibrating reality-distortion field', 'OK', 'ok'],
      ['scraping the open internet (again)', 'OK', 'ok'],
      ['clearing procurement compliance', 'SKIPPED', 'skip'],
      ['spinning up 13 model wrappers', 'OK', 'ok'],
      ['booting confidence module', '1100%', 'num'],
    ],
  };

  root.hidden = false;
  document.body.style.overflow = 'hidden';
  var cleanup = window.HALLU.mount(root, SPLASH_CFG);

  // Glitch flicker schedule: first 3s after the logo has settled, then at a
  // random 11–21s gap each time. (CSS can't randomise intervals, so JS drives
  // it by toggling .glitch-now, which runs the splashGlitch keyframe once.)
  var timers = [];
  function flicker() {
    root.classList.add('glitch-now');
    timers.push(setTimeout(function () { root.classList.remove('glitch-now'); }, 520));
    timers.push(setTimeout(flicker, 11000 + Math.random() * 10000));  // 11–21s
  }
  var waitForLogo = setInterval(function () {
    var footer = root.querySelector('.hi-footer');
    if (footer && footer.classList.contains('show')) {   // reveal finished
      clearInterval(waitForLogo);
      timers.push(setTimeout(flicker, 3000));            // first flicker 3s later
    }
  }, 150);

  var dismissed = false;
  function dismiss() {
    if (dismissed) return;
    dismissed = true;
    root.classList.add('dismissed');
    if (typeof cleanup === 'function') cleanup();
    clearInterval(waitForLogo);
    timers.forEach(clearTimeout);
    document.removeEventListener('keydown', dismiss);
    startForm.submit();  // → POST /start → 303 / → game screen
  }
  document.addEventListener('keydown', function (e) {
    if (e.repeat) return;
    dismiss();
  });
  // Dismiss on ANY pointer interaction, not just a primary click. An Apple
  // trackpad two-finger tap fires a secondary/right click (button 2) which
  // emits `contextmenu`/`auxclick` but no `click` event — so a plain `click`
  // listener silently ignored those taps and left the splash up, making it
  // look like Start "did nothing". pointerdown covers mouse (any button),
  // touch and pen; contextmenu catches the right-click and suppresses the
  // browser menu so the tap dismisses instead.
  root.addEventListener('pointerdown', dismiss);
  root.addEventListener('contextmenu', function (e) { e.preventDefault(); dismiss(); });
  root.addEventListener('touchstart', dismiss, { passive: true });
})();
</script>
</body>
</html>
