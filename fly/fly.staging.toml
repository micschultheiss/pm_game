# fly.staging.toml — Fly.io config for the Hallucination Inc. STAGING app.
#
# Mirrors fly.toml (the prod config) but targets a separate app and scales to
# zero when idle. Staging keeps no durable state (web.py:_games is in-memory),
# so scale-to-zero is free — a cold request just starts a fresh machine.
# CI deploys here first; prod only ships if this deploy comes up healthy.

app = 'hallucination-inc-staging'
primary_region = 'fra'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
