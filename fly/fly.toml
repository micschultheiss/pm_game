# fly.toml — Fly.io deployment config for Hallucination Inc.
#
# Single-machine deploy. The web frontend keeps game state in-memory
# (web.py:_games), so we intentionally do not scale horizontally.

app = 'hallucination-inc'
primary_region = 'fra'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
