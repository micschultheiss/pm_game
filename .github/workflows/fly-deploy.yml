# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/

name: Fly Deploy
on:
  push:
    branches:
      - main
jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group    # optional: ensure only one action runs at a time
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      # Deploy config lives in fly/, but the build context must stay at the
      # repo root so the Dockerfile's `COPY . .` can reach the app source.
      - run: flyctl deploy --remote-only --config fly/fly.toml --dockerfile fly/Dockerfile --ignorefile fly/.dockerignore .
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
